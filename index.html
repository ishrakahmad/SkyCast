<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="sun"></div>

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>

<div class="rain"></div>
<div class="fog"></div>

<div id="rain"></div>

    <div class="bg-animation"></div>

    <div class="container">

        <h1>🌤 SkyCast</h1>

        <!-- Date & Time -->
        <div class="date-time">
            <span id="currentDate"></span>
            <span>|</span>
            <span id="currentTime"></span>
        </div>

        <!-- Search -->
        <div class="search-box">

            <input
                type="text"
                id="cityInput"
                placeholder="Enter City Name">

            <button id="searchBtn" title="Search">
                🔍
            </button>

            <button id="darkBtn" title="Dark Mode">
                🌙
            </button>

        </div>

        <!-- Loading -->
        <p id="loading"></p>

        <!-- Error -->
        <p id="error"></p>

        <!-- Weather Card -->
        <div id="weatherCard">


    

            <img
                id="weatherIcon"
                src=""
                alt="Weather Icon">

            <h2 id="city">
                City
            </h2>

            <h3 id="country">
                Country
            </h3>

            <h1 id="temperature">
                --°C
            </h1>

            <p id="weather">
                Weather
            </p>

            <div class="weather-info">

                <p>
                    🌡 Feels Like :
                    <span id="feelsLike">--</span>°C
                </p>

                <p>
                    🌅 Sunrise :
                    <span id="sunrise">--</span>
                </p>

                <p>
                    🌇 Sunset :
                    <span id="sunset">--</span>
                </p>

                <p>
                    💧 Humidity :
                    <span id="humidity">--</span>%
                </p>

                <p>
                    💨 Wind :
                    <span id="wind">--</span> km/h
                </p>

            </div>

        </div>

        <h2 class="forecast-title">5-Day Forecast</h2>

<div id="forecast" class="forecast-container">

</div>

    </div>

    <script src="script.js"></script>

</body>

</html>
